# CH57x Keyboard Preset: starter
# Safe default preset for a fresh setup.

orientation: normal
rows: 3
columns: 4
knobs: 2

layers:
  - buttons:
      - [f13, f14, f15, f16]
      - [f17, f18, f19, f20]
      - [f21, f22, f23, f24]
    knobs:
      - cw: volumeup
        ccw: volumedown
        press: mute
      - cw: next
        ccw: previous
        press: play
